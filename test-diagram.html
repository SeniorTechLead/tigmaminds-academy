<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/src/index.css" />
<style>body { margin: 0; background: #0f172a; display: flex; justify-content: center; padding: 20px; }</style>
</head>
<body>
<div id="root" style="max-width: 900px; width: 100%;"></div>
<script type="module">
import { createRoot } from 'react-dom/client';
import { createElement } from 'react';

const name = new URLSearchParams(window.location.search).get('d');
if (name) {
  import(/* @vite-ignore */ `/src/components/diagrams/${name}.tsx`).then(mod => {
    createRoot(document.getElementById('root')).render(createElement(mod.default));
  });
}
</script>
</body>
</html>
