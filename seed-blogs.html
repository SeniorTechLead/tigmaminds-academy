<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seed Blogs</title>
</head>
<body>
  <h1>Seeding Blogs...</h1>
  <div id="status">Initializing...</div>

  <script type="module">
    import { seedBlogs } from './src/utils/seedBlogs.ts';

    const statusEl = document.getElementById('status');

    statusEl.textContent = 'Seeding blogs...';

    try {
      const result = await seedBlogs();
      if (result.success) {
        statusEl.textContent = 'Blogs seeded successfully!';
        statusEl.style.color = 'green';
      } else {
        statusEl.textContent = 'Error seeding blogs: ' + JSON.stringify(result.error);
        statusEl.style.color = 'red';
      }
    } catch (error) {
      statusEl.textContent = 'Error: ' + error.message;
      statusEl.style.color = 'red';
    }
  </script>
</body>
</html>
